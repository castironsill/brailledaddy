<!DOCTYPE html>
<html lang="en">
<head>

            display: inline-block; padding: 0.75rem 1.5rem; border: 1px solid var(--accent);
            border-radius: 8px; color: var(--accent); text-decoration: none; letter-spacing: 1px;
        }
        a.home:hover { background: var(--accent); color: var(--bg); }
